<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 임시 홈페이지</title>
    <style>
        /* 간단한 스타일 설정 */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        header {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 2rem 1rem;
        }
        main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 1rem;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        footer {
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #777;
        }
        .btn {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 1rem;
        }
        .btn:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>

    <header>
        <h1>환영합니다!</h1>
        <p>GitHub Pages에서 임시 작동 중인 홈페이지 샘플입니다.</p>
    </header>

    <main>
        <h2>소개</h2>
        <p>이 페이지는 GitHub Pages를 활용하여 임시로 웹 호스팅을 테스트하기 위한 공간입니다. 이곳에 들어갈 내용을 나중에 자유롭게 변경하여 본인만의 홈페이지를 완성해 나갈 수 있습니다.</p>
        
        <h2>향후 계획</h2>
        <ul>
            <li>디자인 세부 수정 및 기능 추가</li>
            <li>포트폴리오 혹은 회사 소개 콘텐츠 작성</li>
            <li>가비아 호스팅 서비스로 최종 이전</li>
        </ul>

        <a href="#" class="btn" onclick="alert('버튼이 정상 작동합니다!')">기능 테스트 버튼</a>
    </main>

    <footer>
        <p>&copy; 2026 임시 웹사이트. All rights reserved.</p>
    </footer>

</body>
</html>
